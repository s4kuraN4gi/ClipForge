# picavel.com
server {
    listen 80;
    server_name picavel.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name picavel.com;

    ssl_certificate /etc/nginx/certs/picavel-origin.pem;
    ssl_certificate_key /etc/nginx/certs/picavel-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 画像アップロード対応（デフォルト1MBだと413エラーになる）
    client_max_body_size 15M;

    # API はキャッシュしない（Cloudflare CDN での認証レスポンス混入防止）
    location /api/ {
        proxy_pass http://picavel-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location / {
        proxy_pass http://picavel-web:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
